  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(--blue);color:var(--blue);background:rgba(43,84,255,.04)}\n  .hero-stats{display:flex;gap:46px;flex-wrap:wrap;margin-top:58px}\n  .hero-stats .s .n{font-size:2rem;font-weight:600;line-height:1}\n  .hero-stats .s .l{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--faint);\n    text-transform:uppercase;margin-top:8px}\n\n  /* generic card */\n  .card{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:26px 24px;\n    transition:transform .25s,box-shadow .25s,border-color .25s}\n  .card:hover{transform:translateY(-5px);border-color:var(--blue3);\n    box-shadow:0 18px 38px -24px rgba(20,30,60,.45)}\n\n  /* positioning two-col */\n  .two{display:grid;grid-template-columns:1.05fr 1fr;gap:54px;align-items:start}\n  @media(max-width:820px){.two{grid-template-columns:1fr;gap:34px}}\n  .lead-stmt{font-size:clamp(1.3rem,2.3vw,1.8rem);font-weight:500;line-height:1.4;\n    letter-spacing:-.01em;color:var(--ink)}\n  .lead-stmt .hl{color:var(--blue)}\n  .lead-p{font-size:1rem;color:var(--muted);line-height:1.62;margin-top:22px}\n\n  /* failure-mode list */\n  .fail{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}\n  .fail .row{padding:22px 24px;border-bottom:1px solid var(--line)}\n  .fail .row:last-child{border-bottom:none}\n  .fail .row h4{font-size:1.02rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:11px;color:var(--ink)}\n  .fail .row .tag{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:500}\n  .fail .row p{font-size:.93rem;color:var(--muted);line-height:1.55}\n  .fail .row .subs{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:8px;letter-spacing:.02em}\n\n  /* approach 4-grid (operating model) */\n  .op-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}\n  @media(max-width:900px){.op-grid{grid-template-columns:repeat(2,1fr)}}\n  @media(max-width:520px){.op-grid{grid-template-columns:1fr}}\n  .op{position:relative;border:1px solid var(--line);border-radius:10px;padding:24px 20px;background:var(--card);\n    transition:transform .25s,box-shadow .25s,border-color .25s}\n  .op:hover{transform:translateY(-5px);border-color:var(--blue3);box-shadow:0 18px 38px -24px rgba(20,30,60,.45)}\n  .op .ix{font-size:1.5rem;font-weight:600;color:var(--blue3);line-height:1;display:block;margin-bottom:13px}\n  .op h4{font-size:1.02rem;font-weight:700;letter-spacing:-.01em;margin-bottom:8px;line-height:1.2}\n  .op p{font-size:.86rem;color:var(--muted);line-height:1.5}\n\n  /* PROOF CASE */\n  .proof{position:relative;border:1px solid var(--line2);border-radius:16px;overflow:hidden;\n    background:linear-gradient(165deg,#ffffff,#f5f8fc);box-shadow:0 30px 70px -50px rgba(20,30,60,.5);padding:34px 32px}\n  @media(max-width:620px){.proof{padding:26px 22px}}\n  .proof .corner{position:absolute;width:12px;height:12px}\n  .proof .c-tl{top:14px;left:14px;border-top:1.5px solid var(--blue);border-left:1.5px solid var(--blue)}\n  .proof .c-tr{top:14px;right:14px;border-top:1.5px solid var(--blue);border-right:1.5px solid var(--blue)}\n  .proof .c-bl{bottom:14px;left:14px;border-bottom:1.5px solid var(--blue);border-left:1.5px solid var(--blue)}\n  .proof .c-br{bottom:14px;right:14px;border-bottom:1.5px solid var(--blue);border-right:1.5px solid var(--blue)}\n  .proof-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}\n  .pill{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;\n    padding:6px 11px;border-radius:5px}\n  .pill-b{background:rgba(43,84,255,.08);color:var(--blue);border:1px solid rgba(43,84,255,.3)}\n  .pill-g{background:#f0f2f7;color:var(--muted);border:1px solid var(--line2)}\n  .proof-context{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;\n    color:var(--blue);margin-bottom:12px}\n  .proof h3{font-size:clamp(1.5rem,2.8vw,2.1rem);font-weight:600;line-height:1.16;letter-spacing:-.02em;\n    margin-bottom:24px;max-width:26ch}\n  .proof-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 30px;margin-bottom:26px}\n  @media(max-width:680px){.proof-grid{grid-template-columns:1fr}}\n  .proof-grid .lab{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;\n    color:var(--blue);margin-bottom:6px}\n  .proof-grid p{font-size:.97rem;color:var(--muted);line-height:1.58}\n  .proof-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;border-top:1px solid var(--line);\n    padding-top:26px;margin-top:4px}\n  @media(max-width:680px){.proof-metrics{grid-template-columns:repeat(2,1fr)}}\n  .pm .n{font-size:1.7rem;font-weight:600;line-height:1;letter-spacing:-.01em}\n  .pm .l{font-size:.82rem;color:var(--muted);margin-top:7px;line-height:1.4}\n  .proof-note{font-size:.8rem;color:var(--faint);margin-top:20px;line-height:1.5;font-style:italic}\n\n  /* harness chips */\n  .harness{margin-top:26px;border-top:1px solid var(--line);padding-top:24px}\n  .harness .h-lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;\n    color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:9px}\n  .harness ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:2px 24px}\n  @media(max-width:680px){.harness ul{grid-template-columns:1fr}}\n  .harness li{font-size:.9rem;color:var(--muted);padding:9px 0;border-bottom:1px solid var(--line);\n    line-height:1.45;display:flex;gap:10px}\n  .harness li .arr{color:var(--blue);flex-shrink:0}\n\n  /* diagram */\n  .diagram-frame{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:28px 24px;\n    box-shadow:0 24px 60px -44px rgba(20,30,60,.45)}\n  .diagram-cap{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;\n    color:var(--faint);margin-top:18px;text-align:center}\n  .diagram-frame svg{width:100%;height:auto;display:block}\n\n  /* themes / selected work rows */\n  .theme-block{margin-bottom:44px}\n  .theme-label{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}\n  .theme-label .num{font-family:var(--mono);font-size:13px;color:var(--blue);letter-spacing:.1em}\n  .theme-label h3{font-size:1.15rem;font-weight:700;letter-spacing:-.01em}\n  .theme-note{font-size:.95rem;color:var(--faint);max-width:64ch;font-style:italic;margin-bottom:18px}\n  .work-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n  @media(max-width:900px){.work-cards{grid-template-columns:1fr}}\n  .wc .wc-org{font-family:var(--mono);font-size:11px;color:var(--blue);letter-spacing:.06em;margin-bottom:8px}\n  .wc h4{font-size:1.02rem;font-weight:700;margin-bottom:9px;line-height:1.22}\n  .wc p{font-size:.88rem;color:var(--muted);line-height:1.5}\n  .project-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);border-bottom:1px solid rgba(43,84,255,.28);padding-bottom:2px;transition:color .2s,border-color .2s}\n  .project-link:hover{color:#1f3fd6;border-color:#1f3fd6}\n\n  /* capabilities grid */\n  .cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n  @media(max-width:900px){.cap-grid{grid-template-columns:1fr}}\n  .cap .cap-n{font-family:var(--mono);font-size:12px;color:var(--blue3);margin-bottom:12px}\n  .cap h4{font-size:1.02rem;font-weight:700;margin-bottom:8px;line-height:1.2}\n  .cap p{font-size:.88rem;color:var(--muted);line-height:1.5}\n\n  /* framework -> control table */\n  .fw-table{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}\n  .fw-row{display:grid;grid-template-columns:.85fr 1.6fr;border-bottom:1px solid var(--line)}\n  .fw-row:last-child{border-bottom:none}\n  .fw-row.diff{background:rgba(43,84,255,.035)}\n  @media(max-width:680px){.fw-row{grid-template-columns:1fr}}\n  .fw-fw{padding:18px 22px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:4px}\n  @media(max-width:680px){.fw-fw{border-right:none;border-bottom:1px solid var(--line);padding-bottom:8px}}\n  .fw-fw .name{font-weight:700;font-size:.98rem}\n  .fw-fw .std{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}\n  .fw-how{padding:18px 22px;font-size:.92rem;color:var(--muted);line-height:1.55}\n  .fw-diff-tag{font-family:var(--mono);font-size:10px;color:var(--blue);letter-spacing:.1em;\n    text-transform:uppercase;margin-top:4px}\n\n  /* governance caps */\n  .gov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:44px}\n  @media(max-width:900px){.gov-grid{grid-template-columns:1fr}}\n\n  /* 90 days */\n  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n  @media(max-width:820px){.days{grid-template-columns:1fr}}\n  .day{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:24px 22px}\n  .day .d-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}\n  .day .d-range{font-family:var(--mono);font-size:11px;color:var(--blue);letter-spacing:.08em}\n  .day .d-name{font-size:1.1rem;font-weight:700}\n  .day ul{list-style:none}\n  .day li{font-size:.88rem;color:var(--muted);line-height:1.45;padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:9px}\n  .day li:last-child{border-bottom:none}\n  .day li .arr{color:var(--blue);flex-shrink:0}\n  .days-note{font-size:.82rem;color:var(--faint);font-style:italic;margin-top:18px}\n\n  /* contact */\n  .contact-card{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}\n\n  footer{position:relative;z-index:2;border-top:1px solid var(--line);padding:32px 0;text-align:center}\n  #sectors{padding:60px 0}\n  #sectors .sec-sub{margin-bottom:30px}\n  .sector-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}\n  @media(max-width:900px){.sector-grid{grid-template-columns:repeat(2,1fr)}}\n  @media(max-width:520px){.sector-grid{grid-template-columns:1fr}}\n  .sector{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:22px 20px;transition:transform .25s,box-shadow .25s,border-color .25s}\n  .sector:hover{transform:translateY(-4px);border-color:var(--blue3);box-shadow:0 18px 38px -24px rgba(20,30,60,.45)}\n  .sector svg{width:22px;height:22px;color:var(--blue);margin-bottom:14px;display:block}\n  .sector h4{font-size:.98rem;font-weight:600;line-height:1.3;color:var(--ink)}\n  .work-cards .wc{display:flex;flex-direction:column}\n  .work-cards .wc p{margin-bottom:14px}\n  .work-cards .wc .project-link{margin-top:auto;align-self:flex-start}\n  footer .ft{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}\n\n  @media print{\n    .aurora,.grid-bg,.progress,nav,.net-canvas{display:none!important}\n    section{padding:30px 0;border:none}\n    [data-reveal]{opacity:1!important;transform:none!important}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"grid-bg\"><\u002Fdiv>\n<div class=\"aurora a1\"><\u002Fdiv>\n<div class=\"aurora a2\"><\u002Fdiv>\n<div class=\"aurora a3\"><\u002Fdiv>\n<canvas class=\"net-canvas\" id=\"net\"><\u002Fcanvas>\n<div class=\"cursor-glow\" id=\"curGlow\"><\u002Fdiv>\n<div class=\"progress\" id=\"progress\"><\u002Fdiv>\n\n<nav id=\"nav\">\n  <a href=\"#top\" class=\"brand\"><span class=\"dot\"><\u002Fspan>SID PANDEY<\u002Fa>\n  <div class=\"navlinks\">\n    <a href=\"#positioning\" class=\"nl\">About<\u002Fa>\n    <a href=\"#failure\" class=\"nl\">Failure Modes<\u002Fa>\n    <a href=\"#proof\" class=\"nl\">Proof Case<\u002Fa>\n    <a href=\"#sectors\" class=\"nl\">Sectors<\u002Fa>\n    <a href=\"#governance\" class=\"nl\">Governance<\u002Fa>\n    <a href=\"#start\" class=\"nl\">How I Start<\u002Fa>\n    <a href=\"#contact\" class=\"nav-cta\">Get in touch →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<header class=\"hero\" id=\"top\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">Sid Pandey · Enterprise AI, Data and Adoption<\u002Fdiv>\n    <h1 data-reveal=\"\">Sid <span class=\"accent\">Pandey<\u002Fspan><\u002Fh1>\n    <p class=\"thesis\" data-reveal=\"\">I get AI adopted inside organisations that can't afford to get it wrong.<\u002Fp>\n    <p class=\"lede\" data-reveal=\"\" style=\"margin-bottom:16px\">The regulated, safety-critical and probity-sensitive ones, where a wrong answer has real consequences and \"move fast and break things\" was never an option. I've done it across transport, infrastructure, finance and beyond.<\u002Fp>\n    <p class=\"lede\" data-reveal=\"\">\n      I work where AI meets real accountability. I turn blocked pilots into governed systems that people actually trust and use, and I do it by fixing the data foundation first, then building the AI on top, so the whole thing holds.\n    <\u002Fp>\n    <div class=\"btn-row\" data-reveal=\"\">\n      <a href=\"#proof\" class=\"btn btn-primary\">See it in practice →<\u002Fa>\n      <a href=\"#start\" class=\"btn btn-ghost\">90-day plan<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-stats\" data-reveal=\"\">\n      <div class=\"s\"><div class=\"n\" data-count=\"15\">15+<\u002Fdiv><div class=\"l\">Years in regulated and safety-critical environments<\u002Fdiv><\u002Fdiv>\n      <div class=\"s\"><div class=\"n\">1×<\u002Fdiv><div class=\"l\">Founder. Built and sold a B2B SaaS<\u002Fdiv><\u002Fdiv>\n      <div class=\"s\"><div class=\"n\">8+<\u002Fdiv><div class=\"l\">Years leading teams<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- POSITIONING -->\n<section id=\"positioning\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">01 · About Me<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">Adoption is a trust problem before it's a technology problem.<\u002Fh2>\n    <div class=\"two\">\n      <div data-reveal=\"\">\n        <p class=\"lead-stmt\">I get organisations to <span class=\"hl\">trust new technology<\u002Fspan>, and I build the governance that keeps it trustworthy at scale.<\u002Fp>\n        <p class=\"lead-p\">Most transformation fails not on the technology but because people don't trust it, or never had a single version of the truth. I've spent my career solving exactly that. The job has always been the same underneath, whatever the title on the door: replacing manual processes and expertise locked in people's heads with data-driven decisions and reporting that runs from executives to the front line, where everyone sees the same numbers. Adoption always comes down to trust. That is the same challenge facing AI today, and the same discipline that makes it safe to scale. It is also where most AI projects fall over, and where I tend to come in.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div class=\"fail\" style=\"background:var(--card)\">\n          <div class=\"row\">\n            <h4><span class=\"tag\">A<\u002Fspan> Founder and consultant<\u002Fh4>\n            <p>Built and exited a B2B analytics SaaS company, while advising and delivering enterprise platforms for clients.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"row\">\n            <h4><span class=\"tag\">B<\u002Fspan> The regulated buyer<\u002Fh4>\n            <p>I've been the risk-averse enterprise that said no to AI, then built the path to a governed yes. I know the objection from the inside.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"row\">\n            <h4><span class=\"tag\">C<\u002Fspan> Adoption and trust<\u002Fh4>\n            <p>The hard part of AI was never the model. It's getting people to trust it and actually use it, and that's the work I focus on once the demo's done.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"row\">\n            <h4><span class=\"tag\">D<\u002Fspan> Ground to boardroom<\u002Fh4>\n            <p>I translate an AI system's behaviour for a frontline user and a Chief Risk Officer in the same afternoon, so each walks away with a decision they can act on.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAILURE MODES (replaces 8-step ladder) -->\n<section id=\"failure\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">02 · Operating Judgement<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">Where enterprise AI breaks, and how I carry it through.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">AI initiatives rarely die at the model. They die in four predictable places. My job is to diagnose the failure mode, prove the value, put the controls around it and carry it into adopted use.<\u002Fp>\n    <div class=\"fail\" data-reveal=\"\">\n      <div class=\"row\">\n        <h4><span class=\"tag\">01<\u002Fspan> Wrong problem<\u002Fh4>\n        <p>The problem was misidentified, or the data foundation underneath it cannot support a trustworthy answer. I map the workflow and the evidence base before choosing the model.<\u002Fp>\n        <div class=\"subs\">misidentified problem · weak data foundation<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <h4><span class=\"tag\">02<\u002Fspan> No accountability<\u002Fh4>\n        <p>No named risk owner, no human oversight gate. I define the review path, decision owner and approval evidence early, so the work has a route out of the sandbox.<\u002Fp>\n        <div class=\"subs\">no risk owner · no human review gate<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <h4><span class=\"tag\">03<\u002Fspan> No trust<\u002Fh4>\n        <p>No evidence trail and no adoption pathway. I build evidence-backed prototypes users can test against real work, delivering clarity faster than any slide deck.<\u002Fp>\n        <div class=\"subs\">no source citation · no adoption pathway<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <h4><span class=\"tag\">04<\u002Fspan> No durability<\u002Fh4>\n        <p>No operating model, no monitoring. I turn pilots into adopted capability with governance, training, operating rhythms and monitoring that outlast the project.<\u002Fp>\n        <div class=\"subs\">no operating model · no monitoring or hardening<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROOF CASE -->\n<section id=\"proof\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">03 · Signature Case Study<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">Took AI from blocked concept to governed operational use.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">One de-identified case, chosen because it shows the complete arc: an environment that had <strong>blocked AI as insecure<\u002Fstrong>, changed into one where a governed AI workflow became the default first step for specialist teams.<\u002Fp>\n\n    <div class=\"proof\" data-reveal=\"\">\n      <span class=\"corner c-tl\"><\u002Fspan><span class=\"corner c-tr\"><\u002Fspan>\n      <span class=\"corner c-bl\"><\u002Fspan><span class=\"corner c-br\"><\u002Fspan>\n\n      <div class=\"proof-tags\">\n        <span class=\"pill pill-b\">Hands-on build &amp; demo<\u002Fspan>\n        <span class=\"pill pill-b\">Approved &amp; adopted<\u002Fspan>\n        <span class=\"pill pill-g\">Probity-sensitive<\u002Fspan>\n        <span class=\"pill pill-g\">Audit-ready<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"proof-context\">Victorian Government · Major rail franchise tender · Secure AI workflow in a probity-sensitive data room<\u002Fdiv>\n      <h3>An evidence room where a wrong answer can bind a 15-year contract, so the AI had to cite its source or stay silent.<\u002Fh3>\n\n      <div class=\"proof-grid\">\n        <div>\n          <div class=\"lab\">The problem<\u002Fdiv>\n          <p>At tender scale, specialists fielded <strong>100+ clarification questions per bidder, per month<\u002Fstrong>, each requiring an evidence-backed, legally defensible answer drawn only from approved documents. Manual search and drafting across seven specialist teams was slow. Different reviewers could read the same evidence differently, which created a probity risk, not just an efficiency issue.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"lab\">The environment<\u002Fdiv>\n          <p>A controlled, audited data room, the single channel between franchise and bidders, version-controlled, every view logged. A zero-risk appetite environment with controls comparable to those expected in banking, infrastructure and public sector assurance. AI had been <strong>blocked outright as insecure<\u002Fstrong>; the work was changing that.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"lab\">What I did<\u002Fdiv>\n          <p>Recognised the pattern, educated stakeholders, and built a working prototype to <strong>demonstrate rather than pitch<\u002Fstrong>: a document-grounded, multi-agent workflow that routes each question to the right specialist team, retrieves only from approved sources, drafts with citations or abstains, then routes to a named human reviewer. I designed the retrieval flow, routing logic, abstain rules and review gates myself, then put the controls on and earned the approvals.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"lab\">The decision under pressure<\u002Fdiv>\n          <p>When AI was blocked as unsuitable for a secure environment, I did not bypass the concern. I reframed the problem around <strong>secure deployment, source control, access boundaries and mandatory human review<\u002Fstrong>. That moved the organisation from a blanket \"no\" to a governed \"yes\" without weakening a single risk control.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"proof-metrics\">\n        <div class=\"pm\"><div class=\"n\">~17 users<\u002Fdiv><div class=\"l\">Core users across 7 specialist teams, supporting a working group of roughly 60.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pm\"><div class=\"n\">0<\u002Fdiv><div class=\"l\">Unsupported answers reached approval. Every material claim was cited or the system abstained, and every output passed a named human reviewer before sign-off. The control, not the count, is what makes that true.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pm\"><div class=\"n\">~$50k<\u002Fdiv><div class=\"l\">Annual run cost, a fraction of the manual effort it replaced.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pm\"><div class=\"n\">~$14M<\u002Fdiv><div class=\"l\">The AI capability investment case this work helped evidence.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"proof-note\">Adoption figures are directional estimates from the delivery period. The cost and assurance numbers are drawn from project records.<\u002Fp>\n\n      <div class=\"harness\">\n        <div class=\"h-lab\">◆ The harness that made it safe<\u002Fdiv>\n        <ul>\n          <li><span class=\"arr\">→<\u002Fspan><span>Human review and sign-off at every decision gate<\u002Fspan><\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan><span>Retrieval grounded only in approved, version-controlled sources<\u002Fspan><\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan><span>Citation-or-abstain rule on every material claim<\u002Fspan><\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan><span>Filing and answering split into separate agents to cut error<\u002Fspan><\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan><span>Audit trail: actor, decision, timestamp and rationale logged<\u002Fspan><\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan><span>Access boundaries and defined escalation pathways<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ARCHITECTURE DIAGRAM -->\n<section id=\"architecture\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">04 · Reference Architecture<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">What a governed AI workflow actually looks like.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">The same system, drawn as a pattern. Augmentation, not automation: the system searches, retrieves and drafts; the human keeps judgement, accountability and the final sign-off. The controls are visible in the flow, not promised in a policy.<\u002Fp>\n    <div class=\"diagram-frame\" data-reveal=\"\">\n      <svg viewBox=\"0 0 1000 560\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Governed AI workflow architecture diagram\">\n        <defs>\n          <marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n            <path d=\"M0,0 L10,5 L0,10 z\" fill=\"#9aa2b2\"><\u002Fpath>\n          <\u002Fmarker>\n          <linearGradient id=\"signoff\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0\" stop-color=\"#2b54ff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#6f86ff\"><\u002Fstop>\n          <\u002FlinearGradient>\n        <\u002Fdefs>\n\n        <!-- INTAKE -->\n        <g>\n          <rect x=\"24\" y=\"190\" width=\"150\" height=\"118\" rx=\"12\" fill=\"#fff\" stroke=\"#d4dae4\"><\u002Frect>\n          <text x=\"99\" y=\"218\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"11\" letter-spacing=\"1.5\" fill=\"#2b54ff\">INTAKE<\u002Ftext>\n          <text x=\"99\" y=\"248\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"14\" font-weight=\"600\" fill=\"#0b1220\">Bidder question<\u002Ftext>\n          <text x=\"99\" y=\"270\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11.5\" fill=\"#555f72\">+ risk / team<\u002Ftext>\n          <text x=\"99\" y=\"286\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11.5\" fill=\"#555f72\">classification<\u002Ftext>\n        <\u002Fg>\n        <line x1=\"178\" y1=\"249\" x2=\"214\" y2=\"249\" stroke=\"#9aa2b2\" stroke-width=\"1.6\" marker-end=\"url(#arrow)\"><\u002Fline>\n\n        <!-- SUPERVISOR -->\n        <g>\n          <rect x=\"218\" y=\"190\" width=\"150\" height=\"118\" rx=\"12\" fill=\"#eef2ff\" stroke=\"#2b54ff\"><\u002Frect>\n          <text x=\"293\" y=\"218\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"11\" letter-spacing=\"1.5\" fill=\"#2b54ff\">SUPERVISOR<\u002Ftext>\n          <text x=\"293\" y=\"248\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"14\" font-weight=\"600\" fill=\"#0b1220\">Routes &amp; manages<\u002Ftext>\n          <text x=\"293\" y=\"270\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11.5\" fill=\"#555f72\">state across<\u002Ftext>\n          <text x=\"293\" y=\"286\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11.5\" fill=\"#555f72\">teams<\u002Ftext>\n        <\u002Fg>\n        <line x1=\"372\" y1=\"249\" x2=\"408\" y2=\"249\" stroke=\"#9aa2b2\" stroke-width=\"1.6\" marker-end=\"url(#arrow)\"><\u002Fline>\n\n        <!-- SPECIALIST AGENTS -->\n        <text x=\"640\" y=\"70\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"11\" letter-spacing=\"1.2\" fill=\"#2b54ff\">SPECIALIST TEAMS · EACH WITH ITS OWN RETRIEVAL KB AND APPROVED-ANSWER MEMORY<\u002Ftext>\n        <g>\n          <rect x=\"412\" y=\"92\" width=\"200\" height=\"96\" rx=\"11\" fill=\"#fff\" stroke=\"#d4dae4\"><\u002Frect>\n          <text x=\"512\" y=\"124\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13.5\" font-weight=\"700\" fill=\"#0b1220\">Engineering<\u002Ftext>\n          <text x=\"512\" y=\"146\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11\" fill=\"#555f72\">Specs, assets, requirements<\u002Ftext>\n          <text x=\"512\" y=\"170\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"9.5\" fill=\"#9aa2b2\">own KB · own approved-answer memory<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"412\" y=\"201\" width=\"200\" height=\"96\" rx=\"11\" fill=\"#fff\" stroke=\"#d4dae4\"><\u002Frect>\n          <text x=\"512\" y=\"233\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13.5\" font-weight=\"700\" fill=\"#0b1220\">Legal / Commercial<\u002Ftext>\n          <text x=\"512\" y=\"255\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11\" fill=\"#555f72\">Contracts, obligations, probity<\u002Ftext>\n          <text x=\"512\" y=\"279\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"9.5\" fill=\"#9aa2b2\">own KB · own approved-answer memory<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"412\" y=\"310\" width=\"200\" height=\"96\" rx=\"11\" fill=\"#fff\" stroke=\"#d4dae4\"><\u002Frect>\n          <text x=\"512\" y=\"342\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13.5\" font-weight=\"700\" fill=\"#0b1220\">Finance<\u002Ftext>\n          <text x=\"512\" y=\"364\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11\" fill=\"#555f72\">Cost, pricing, commercial model<\u002Ftext>\n          <text x=\"512\" y=\"388\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"9.5\" fill=\"#9aa2b2\">own KB · own approved-answer memory<\u002Ftext>\n        <\u002Fg>\n        <text x=\"640\" y=\"430\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11\" fill=\"#9aa2b2\" font-style=\"italic\">+ 4 further governed teams · seven in total<\u002Ftext>\n        <!-- supervisor to agents -->\n        <path d=\"M412,249 L405,249 Q400,249 400,242 L400,140 Q400,140 408,140\" fill=\"none\" stroke=\"#9aa2b2\" stroke-width=\"1.4\" marker-end=\"url(#arrow)\"><\u002Fpath>\n        <line x1=\"400\" y1=\"249\" x2=\"408\" y2=\"249\" stroke=\"#9aa2b2\" stroke-width=\"1.4\" marker-end=\"url(#arrow)\"><\u002Fline>\n        <path d=\"M400,249 L400,358 Q400,358 408,358\" fill=\"none\" stroke=\"#9aa2b2\" stroke-width=\"1.4\" marker-end=\"url(#arrow)\"><\u002Fpath>\n\n        <!-- DRAFT + CITE -->\n        <line x1=\"612\" y1=\"249\" x2=\"648\" y2=\"249\" stroke=\"#9aa2b2\" stroke-width=\"1.6\" marker-end=\"url(#arrow)\"><\u002Fline>\n        <g>\n          <rect x=\"652\" y=\"190\" width=\"150\" height=\"118\" rx=\"12\" fill=\"#fff\" stroke=\"#d4dae4\"><\u002Frect>\n          <text x=\"727\" y=\"218\" text-anchor=\"middle\" font-family=\"'IBM Plex Mono',monospace\" font-size=\"11\" letter-spacing=\"1.2\" fill=\"#2b54ff\">DRAFT + CITE<\u002Ftext>\n          <text x=\"727\" y=\"246\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13\" font-weight=\"600\" fill=\"#0b1220\">Grounded draft,<\u002Ftext>\n          <text x=\"727\" y=\"266\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13\" font-weight=\"600\" fill=\"#0b1220\">pinned citations<\u002Ftext>\n          <text x=\"727\" y=\"288\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"11\" fill=\"#555f72\">or abstains<\u002Ftext>\n        <\u002Fg>\n\n        <!-- HUMAN GATE 1 -->\n        <line x1=\"806\" y1=\"249\" x2=\"842\" y2=\"249\" stroke=\"#9aa2b2\" stroke-width=\"1.6\" marker-end=\"url(#arrow)\"><\u002Fline>\n        <g>\n          <rect x=\"846\" y=\"190\" width=\"130\" height=\"118\" rx=\"12\" fill=\"#fff\" stroke=\"#2b54ff\"><\u002Frect>\n          <circle cx=\"911\" cy=\"222\" r=\"13\" fill=\"#eef2ff\" stroke=\"#2b54ff\"><\u002Fcircle>\n          <text x=\"911\" y=\"227\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"13\" fill=\"#2b54ff\">✓<\u002Ftext>\n          <text x=\"911\" y=\"258\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"12.5\" font-weight=\"700\" fill=\"#0b1220\">Human<\u002Ftext>\n          <text x=\"911\" y=\"275\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"12.5\" font-weight=\"700\" fill=\"#0b1220\">review<\u002Ftext>\n          <text x=\"911\" y=\"293\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#555f72\">approve / edit / reject<\u002Ftext>\n        <\u002Fg>\n\n        <!-- SIGN-OFF + AUDIT BAR -->\n        <rect x=\"24\" y=\"468\" width=\"952\" height=\"68\" rx=\"12\" fill=\"url(#signoff)\"><\u002Frect>\n        <circle cx=\"66\" cy=\"502\" r=\"15\" fill=\"rgba(255,255,255,.18)\"><\u002Fcircle>\n        <text x=\"66\" y=\"508\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"15\" fill=\"#fff\">⛉<\u002Ftext>\n        <text x=\"96\" y=\"496\" font-family=\"Inter,sans-serif\" font-size=\"14.5\" font-weight=\"700\" fill=\"#fff\">Supervisor sign-off → audit log + shared approved-answer memory<\u002Ftext>\n        <text x=\"96\" y=\"517\" font-family=\"Inter,sans-serif\" font-size=\"11.5\" fill=\"rgba(255,255,255,.9)\">Every approved answer is logged with actor, decision, timestamp and rationale, then fed back as reusable evidence. Each specialist team also retains its own approved-answer memory.<\u002Ftext>\n        <!-- gate1 down to bar -->\n        <path d=\"M911,308 L911,430 Q911,454 880,454 L780,454 Q760,454 760,468\" fill=\"none\" stroke=\"#9aa2b2\" stroke-width=\"1.4\" marker-end=\"url(#arrow)\"><\u002Fpath>\n      <\u002Fsvg>\n      <div class=\"diagram-cap\">Example governed AI workflow for regulated infrastructure decision support · de-identified reference pattern<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SELECTED WORK -->\n<section id=\"work\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">05 · Selected Work<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">The foundations the pattern runs on. I build both.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">Most AI doesn't fail at the model. It fails because the data underneath was never fixed, so the system is fragile, hard to diagnose and impossible to trust. That's the gap I close. I've led large, public, named programmes to repair the foundation, where data was fragmented, contradictory and locked away across vendors, then built the AI to sit on top of it. Owning both layers is the point. A clean foundation is what makes an AI system robust, easy to diagnose and safe to rely on. Fix the base and build on it, and it holds. Skip the base, and it breaks. That's the edge.<\u002Fp>\n\n    <div class=\"theme-block\" data-reveal=\"\">\n      <div class=\"theme-label\"><span class=\"num\">01<\u002Fspan><h3>Data integration and decision platforms<\u002Fh3><\u002Fdiv>\n      <p class=\"theme-note\">The foundational layer for AI, reporting and operational decisions.<\u002Fp>\n      <div class=\"work-cards\">\n        <div class=\"card wc\">\n          <div class=\"wc-org\">DTP · Metro Tunnel<\u002Fdiv>\n          <h4>Network data integration into Snowflake<\u002Fh4>\n          <p>I led the consolidation of data from multiple vendors into one governed Snowflake environment, the layer that has to exist before Power BI, enterprise reporting or any trustworthy AI can sit on top. I designed those layers deliberately, so the foundation was ready for AI from the day it went live, not retrofitted under pressure later. This turned fragmented project and network data into a single, decision-ready base.<\u002Fp>\n          <a class=\"project-link\" href=\"https://bigbuild.vic.gov.au/projects/metro-tunnel\" target=\"_blank\" rel=\"noopener noreferrer\">Public project link ↗<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"card wc\">\n          <div class=\"wc-org\">DTP · Public Transport Data Program<\u002Fdiv>\n          <h4>Public transport data architecture<\u002Fh4>\n          <p>I led the data architecture workstream for the Public Transport Data Program, setting how public transport information would be standardised, controlled and published across Victoria. I built that structure to hold far more than reporting, so the same foundation could carry analytics and AI later without being torn up and redone. It supports better real-time travel information and open transport data across the state.<\u002Fp>\n          <a class=\"project-link\" href=\"https://transport.vic.gov.au/help-and-support/other-public-transport-help/public-transport-data-program\" target=\"_blank\" rel=\"noopener noreferrer\">Public program link ↗<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"card wc\">\n          <div class=\"wc-org\">DTP · Victoria's 30-year infrastructure strategy<\u002Fdiv>\n          <h4>Statewide data and digital systems input<\u002Fh4>\n          <p>I contributed transport data and digital systems input to Victoria's 30-year infrastructure strategy, 2025 to 2055, shaping how road and rail asset, performance and risk information supports cross-agency decisions. My angle was the part most strategy skips: structuring that data so it can carry AI-enabled decisions later, not just today's reports. It's a statewide strategy the government must respond to under the Infrastructure Victoria Act.<\u002Fp>\n          <a class=\"project-link\" href=\"https://www.infrastructurevictoria.com.au/resources/victorias-30-year-strategy\" target=\"_blank\" rel=\"noopener noreferrer\">Public strategy link ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"theme-block\" data-reveal=\"\">\n      <div class=\"theme-label\"><span class=\"num\">02<\u002Fspan><h3>Safety-critical and operational technology delivery<\u002Fh3><\u002Fdiv>\n      <p class=\"theme-note\">Where reliability and accountability are the test any AI has to pass before people trust it near the work.<\u002Fp>\n      <div class=\"work-cards\">\n        <div class=\"card wc\">\n          <div class=\"wc-org\">Transurban<\u002Fdiv>\n          <h4>AI pacemaker lighting · Burnley Tunnel<\u002Fh4>\n          <p>I delivered work on an AI-enabled traffic-flow programme that used dynamic \"pacemaker\" lighting to smooth driver behaviour in a tunnel with no room for error, carrying the heavy documentation, operational accountability and safety scrutiny that environment demands.<\u002Fp>\n          <a class=\"project-link\" href=\"https://www.transurban.com/news/pacemaker-lighting-is-making-burnley-tunnel-a-better-drive\" target=\"_blank\" rel=\"noopener noreferrer\">Public project link ↗<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"card wc\">\n          <div class=\"wc-org\">V/Line<\u002Fdiv>\n          <h4>RRCN 3G to 4G communications migration<\u002Fh4>\n          <p>I led the data workstream on the migration of essential rail communications from 3G to 4G across heavy and urban rail, where service continuity, stakeholder coordination and operational reliability could not slip.<\u002Fp>\n          <a class=\"project-link\" href=\"https://www.victrack.com.au/news/2024/essential-communications-services-migrated-to-4g\" target=\"_blank\" rel=\"noopener noreferrer\">Public project link ↗<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"card wc\">\n          <div class=\"wc-org\">Regulated infrastructure<\u002Fdiv>\n          <h4>Asset analytics and reporting foundations<\u002Fh4>\n          <p>I built asset analytics and reporting capability across infrastructure environments, turning messy operational records into structured information for performance, risk, renewal and executive decisions.<\u002Fp>\n          <a class=\"project-link\" href=\"https://bigbuild.vic.gov.au/about/digital-engineering\" target=\"_blank\" rel=\"noopener noreferrer\">Public context link ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SECTORS (tiered) -->\n<section id=\"sectors\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">06 · Where I've Delivered<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">I get across a business fast, work out what will actually work, and explain it so people come along.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">The problem underneath is usually the same one. A complicated organisation, high stakes, and data that isn't ready to support a decision people can trust. Here's where that has taken me so far. It's where I've worked, not the limit of where the skill works.<\u002Fp>\n\n    <div class=\"sector-grid\" data-reveal=\"\">\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"3\" width=\"16\" height=\"16\" rx=\"2\"/><path d=\"M4 11h16\"/><path d=\"M12 3v8\"/><path d=\"m8 19-2 3\"/><path d=\"m18 22-2-3\"/><\u002Fsvg><h4>Rail &amp; public transport<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"19\" r=\"3\"/><path d=\"M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15\"/><circle cx=\"18\" cy=\"5\" r=\"3\"/><\u002Fsvg><h4>Toll roads &amp; transport infrastructure<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z\"/><path d=\"M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2\"/><path d=\"M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2\"/><path d=\"M10 6h4\"/><path d=\"M10 10h4\"/><path d=\"M10 14h4\"/><\u002Fsvg><h4>Regulated physical infrastructure<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" x2=\"12\" y1=\"2\" y2=\"22\"/><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"/><\u002Fsvg><h4>Finance &amp; commercial decision-making<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"13 2 3 14 12 14 11 22 21 10 12 10 13 2\"/><\u002Fsvg><h4>Utilities, energy &amp; water<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2\"/><\u002Fsvg><h4>Health<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m8 3 4 8 5-5 5 15H2L8 3z\"/><\u002Fsvg><h4>Mining, oil &amp; gas<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z\"/><\u002Fsvg><h4>Defence-adjacent<\u002Fh4><\u002Fdiv>\n      <div class=\"sector\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z\"/><path d=\"M6 18h12\"/><path d=\"M6 14h12\"/><path d=\"M6 10h12\"/><\u002Fsvg><h4>FMCG &amp; manufacturing<\u002Fh4><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- GOVERNANCE: framework -> control -->\n<section id=\"governance\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">07 · What I Lead + Governance<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">The leadership and governance that let AI move safely.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">This is the work I lead: AI strategy and adoption, responsible AI controls, executive navigation, regulated implementation, data and systems leadership, and moving pilots into operational use. The frameworks below are how I make that practical. I operate them, I do not just cite them.<\u002Fp>\n\n    <div class=\"fw-table\" data-reveal=\"\">\n      <div class=\"fw-row\">\n        <div class=\"fw-fw\"><span class=\"name\">NIST AI RMF<\u002Fspan><span class=\"std\">AI Risk Management Framework<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Risk tier AI use cases, define harm scenarios, map controls to each tier, and monitor residual risk through the lifecycle, so governance scales with exposure instead of treating everything the same.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-row\">\n        <div class=\"fw-fw\"><span class=\"name\">ISO/IEC 42001<\u002Fspan><span class=\"std\">AI Management System<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Stand up the management system, assign roles and accountabilities, run lifecycle controls and governance cadence, and maintain the evidence packs that let AI use survive audit and scale across teams.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-row\">\n        <div class=\"fw-fw\"><span class=\"name\">ISO/IEC 23894<\u002Fspan><span class=\"std\">AI Risk Management<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Convert AI risks into registers with named owners, mitigations, review triggers and clear accountability. That keeps risk active and managed, instead of just written down.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-row\">\n        <div class=\"fw-fw\"><span class=\"name\">EU AI Act<\u002Fspan><span class=\"std\">+ AU Responsible AI Principles<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Use as a reference point for global enterprise AI risk classification, documentation, transparency and human oversight expectations, and translate Australian responsible AI principles into operational controls.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-row\">\n        <div class=\"fw-fw\"><span class=\"name\">ISO/IEC 27001<\u002Fspan><span class=\"std\">Information Security<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Enforce access control, design the secure environment, classify information and keep every action auditable. This is the security spine that lets sensitive data anywhere near an AI system.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fw-row diff\">\n        <div class=\"fw-fw\"><span class=\"name\">ISO 55001<\u002Fspan><span class=\"std\">Asset Management · Lead Auditor<\u002Fspan><\u002Fdiv>\n        <div class=\"fw-how\">Underpinning all of it: 15 years operating to ISO 55001 in environments where governance failures had physical consequences. I link AI outputs to real asset decisions, lifecycle risk and assurance obligations. This is the rare capability most AI governance candidates cannot claim.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HELP AI COMPANIES SELL -->\n<section id=\"for-labs\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">08 · For AI Companies + Enterprise Teams<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">I help AI move <em>into<\u002Fem> regulated enterprises, from both sides of the table.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">I have spent 15 years as the regulated buyer who said \"no\" to AI and then worked out how to say a governed \"yes.\" That helps AI companies clear the real enterprise objection, and helps in-house teams buy, govern and adopt AI without weakening control.<\u002Fp>\n    <div class=\"two\" data-reveal=\"\">\n      <div>\n        <p class=\"lead-stmt\">Where I create value for AI companies and enterprise teams:<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"fail\" style=\"background:var(--card)\">\n          <div class=\"row\"><h4><span class=\"tag\">→<\u002Fspan> Neutralise the risk objection<\u002Fh4><p>Translate a Chief Risk Officer's \"this isn't safe\" into the specific controls: grounding, citation, review gates and audit trail. That is what turns it into a yes.<\u002Fp><\u002Fdiv>\n          <div class=\"row\"><h4><span class=\"tag\">→<\u002Fspan> Qualify use cases &amp; secure deployment paths<\u002Fh4><p>Separate the workflows AI should touch from the ones it shouldn't, and design the deployment pattern that survives probity and security review.<\u002Fp><\u002Fdiv>\n          <div class=\"row\"><h4><span class=\"tag\">→<\u002Fspan> Convert pilots to operational use<\u002Fh4><p>The reusable governance pattern, executive education and operating model that move a high-profile pilot into everyday use.<\u002Fp><\u002Fdiv>\n          <div class=\"row\"><h4><span class=\"tag\">→<\u002Fspan> Feed the field back to product &amp; policy<\u002Fh4><p>What regulated buyers actually need to trust the product, routed back to the teams who can build and codify it.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW I START -->\n<section id=\"start\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">09 · How I Start<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">How I build momentum in an Enterprise AI Strategy &amp; Governance role.<\u002Fh2>\n    <p class=\"sec-sub\" data-reveal=\"\">A starting hypothesis, not a fixed plan. I would tune it to your actual priorities in week one. The shape is what matters: diagnose, design and operationalise.<\u002Fp>\n    <div class=\"days\">\n      <div class=\"day\" data-reveal=\"\">\n        <div class=\"d-head\"><span class=\"d-name\">Diagnose<\u002Fspan><span class=\"d-range\">Days 1 to 30<\u002Fspan><\u002Fdiv>\n        <ul>\n          <li><span class=\"arr\">→<\u002Fspan>Map priority AI opportunities and where the high-value, high-friction workflows sit<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Assess data readiness, governance gaps and stakeholder risk appetite<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Identify what's blocked, risky, or quietly already in use without controls<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day\" data-reveal=\"\">\n        <div class=\"d-head\"><span class=\"d-name\">Design<\u002Fspan><span class=\"d-range\">Days 31 to 60<\u002Fspan><\u002Fdiv>\n        <ul>\n          <li><span class=\"arr\">→<\u002Fspan>Build the intake and risk-tiering model<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Define human-oversight, security, evidence and escalation controls<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Pick 2 to 3 high-profile pilots with a named executive sponsor<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"day\" data-reveal=\"\">\n        <div class=\"d-head\"><span class=\"d-name\">Operationalise<\u002Fspan><span class=\"d-range\">Days 61 to 90<\u002Fspan><\u002Fdiv>\n        <ul>\n          <li><span class=\"arr\">→<\u002Fspan>Launch governed pilots with adoption playbooks and training<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Stand up executive reporting, risk dashboards and review cadence<\u002Fli>\n          <li><span class=\"arr\">→<\u002Fspan>Convert lessons into a repeatable enterprise AI governance pattern<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"days-note\">Tailored to the specific role on request. I am happy to rebuild this against your actual roadmap and constraints.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\" data-reveal=\"\">10 · Contact<\u002Fdiv>\n    <h2 class=\"sec-head\" data-reveal=\"\">Let's talk about getting AI past the hard part.<\u002Fh2>\n    <div class=\"contact-card\" data-reveal=\"\">\n      <a href=\"mailto:siddhartha27@gmail.com\" class=\"btn btn-primary\">siddhartha27@gmail.com →<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/sidpandey6/\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-ghost\">LinkedIn<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"wrap\">\n    <div class=\"ft\">SID PANDEY · ENTERPRISE AI STRATEGY, ADOPTION &amp; GOVERNANCE<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ANIMATION CONTROLS -->\n<button class=\"tw-fab\" id=\"twFab\" title=\"Animation controls\" aria-label=\"Animation controls\">\n  <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath><\u002Fsvg>\n<\u002Fbutton>\n<div class=\"tw-panel\" id=\"twPanel\" hidden=\"\">\n  <div class=\"tw-h\"><span>Number rain<\u002Fspan><span class=\"x\" id=\"twClose\">✕<\u002Fspan><\u002Fdiv>\n  <div class=\"tw-toggle\"><span>Enabled<\u002Fspan><div class=\"tw-switch on\" id=\"twEnabled\"><span class=\"k\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Characters<\u002Fdiv>\n    <div class=\"tw-seg\" id=\"twCharset\">\n      <button data-v=\"numbers\">0-9<\u002Fbutton>\n      <button data-v=\"binary\">0/1<\u002Fbutton>\n      <button data-v=\"hex\">HEX<\u002Fbutton>\n      <button data-v=\"code\" class=\"on\">&lt;/&gt;<\u002Fbutton>\n    <\u002Fdiv><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Density <span class=\"v\" id=\"twDensityV\">1.0<\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"twDensity\" min=\"0.5\" max=\"2.2\" step=\"0.1\" value=\"1\"><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Fall speed <span class=\"v\" id=\"twSpeedV\">1.0<\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"twSpeed\" min=\"0.3\" max=\"3\" step=\"0.1\" value=\"1\"><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Trail length <span class=\"v\" id=\"twTrailV\">14<\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"twTrail\" min=\"4\" max=\"30\" step=\"1\" value=\"14\"><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Glyph size <span class=\"v\" id=\"twSizeV\">15<\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"twSize\" min=\"10\" max=\"26\" step=\"1\" value=\"15\"><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Intensity <span class=\"v\" id=\"twIntV\">0.55<\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"twInt\" min=\"0.2\" max=\"1\" step=\"0.05\" value=\"0.55\"><\u002Fdiv>\n  <div class=\"tw-row\"><div class=\"tw-lab\">Colour<\u002Fdiv>\n    <div class=\"tw-sw\" id=\"twColor\">\n      <button data-c=\"43,84,255\" style=\"background:#2b54ff\" class=\"on\"><\u002Fbutton>\n      <button data-c=\"124,92,255\" style=\"background:#7c5cff\"><\u002Fbutton>\n      <button data-c=\"34,180,238\" style=\"background:#22b4ee\"><\u002Fbutton>\n      <button data-c=\"11,18,32\" style=\"background:#0b1220\"><\u002Fbutton>\n    <\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // progress bar + nav shadow\n  var nav=document.getElementById('nav'), bar=document.getElementById('progress');\n  function onScroll(){\n    var h=document.documentElement;\n    var sc=h.scrollTop||document.body.scrollTop;\n    var max=h.scrollHeight-h.clientHeight;\n    bar.style.width=(max>0?(sc/max*100):0)+'%';\n    nav.classList.toggle('scrolled', sc>10);\n  }\n  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();\n\n  // reveal\n  var reveals=[].slice.call(document.querySelectorAll('[data-reveal]'));\n  if('IntersectionObserver' in window){\n    var io=new IntersectionObserver(function(es){\n      es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });\n    },{threshold:.12, rootMargin:'0px 0px -6% 0px'});\n    reveals.forEach(function(el){io.observe(el);});\n  } else { reveals.forEach(function(el){el.classList.add('in');}); }\n\n  // count-up for the 15+\n  var counted=false;\n  function runCounts(){\n    if(counted) return; counted=true;\n    document.querySelectorAll('[data-count]').forEach(function(el){\n      var target=parseInt(el.getAttribute('data-count'),10), t0=performance.now(), dur=1100;\n      function tick(now){\n        var p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);\n        el.textContent=Math.round(target*e)+'+';\n        if(p<1) requestAnimationFrame(tick);\n      }\n      requestAnimationFrame(tick);\n    });\n  }\n  setTimeout(runCounts,400);\n\n  // hackathon number rain (code-rain) + live tweak controls\n  (function(){\n    var canvas=document.getElementById('net'); if(!canvas) return;\n    var ctx=canvas.getContext('2d');\n    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    var DPR=Math.min(window.devicePixelRatio||1,2);\n\n    var SETS={numbers:'0123456789'.split(''),binary:'01'.split(''),hex:'0123456789ABCDEF'.split(''),code:'0123456789ABCDEF+=/<>{}'.split('')};\n    var cfg={enabled:true,charset:'code',density:1.3,speed:0.28,trail:20,size:14,intensity:0.16,color:'43,84,255'};\n    try{var s=localStorage.getItem('sidRainTweaks'); if(s) cfg=Object.assign(cfg,JSON.parse(s));}catch(e){}\n    function save(){try{localStorage.setItem('sidRainTweaks',JSON.stringify(cfg));}catch(e){}}\n\n    var W=0,H=0,cols=[],raf=null;\n    var mx=-9999,my=-9999,tx=-9999,ty=-9999,lastMove=-9999,gOp=0;\n    var MR=205, glow=document.getElementById('curGlow');\n    window.addEventListener('pointermove',function(e){tx=e.clientX; ty=e.clientY; lastMove=performance.now();},{passive:true});\n    function chars(){return SETS[cfg.charset]||SETS.numbers;}\n    function rnd(a,b){return a+Math.random()*(b-a);}\n    function pick(a){return a[(Math.random()*a.length)|0];}\n\n    function build(){\n      cols=[];\n      var fs=cfg.size, gap=fs*(1.7/cfg.density);\n      var x0=Math.round(W*0.56), span=Math.max(gap, W-x0);\n      var n=Math.max(1,Math.floor(span/gap)), step=span/n;\n      for(var i=0;i<n;i++){\n        var x=Math.round(x0+i*step+step/2);\n        cols.push({x:x, fade:Math.min(1,(x-x0)/150), head:rnd(-H,0), sp:rnd(0.6,1.6), buf:[], last:null});\n      }\n    }\n    function size(){\n      W=canvas.clientWidth; H=canvas.clientHeight;\n      canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);\n      ctx.setTransform(DPR,0,0,DPR,0,0);\n      build();\n      if(reduce){ // static fallback: pre-fill and draw one frame\n        for(var i=0;i<cols.length;i++){var c=cols[i]; c.head=rnd(H*0.2,H); c.buf=[]; for(var k=0;k<cfg.trail;k++)c.buf.push(pick(chars()));}\n        frame();\n      }\n    }\n\n    function frame(){\n      // cursor spotlight (smoothed follow + idle fade)\n      mx+=(tx-mx)*0.16; my+=(ty-my)*0.16;\n      var idle=performance.now()-lastMove, targetOp=(idle<1400)?1:0;\n      gOp+=(targetOp-gOp)*0.07;\n      if(glow){ glow.style.transform='translate('+mx.toFixed(1)+'px,'+my.toFixed(1)+'px)'; glow.style.opacity=(gOp*0.9).toFixed(3); }\n      ctx.clearRect(0,0,W,H);\n      if(cfg.enabled){\n        var fs=cfg.size, set=chars(), trail=cfg.trail;\n        ctx.font='600 '+fs+'px \"IBM Plex Mono\", monospace'; ctx.textBaseline='middle';\n        for(var i=0;i<cols.length;i++){\n          var c=cols[i];\n          if(!reduce){\n            c.head+=c.sp*cfg.speed*(fs*0.16);\n            var cell=Math.floor(c.head/fs);\n            if(cell!==c.last){ c.last=cell; c.buf.unshift(pick(set)); if(c.buf.length>trail) c.buf.length=trail; }\n            if(c.buf.length && Math.random()<0.04) c.buf[(Math.random()*c.buf.length)|0]=pick(set);\n          }\n          for(var k=0;k<c.buf.length;k++){\n            var y=c.head-k*fs; if(y<-fs||y>H+fs) continue;\n            var a=(k===0)?(cfg.intensity+0.14):cfg.intensity*(1-k/trail);\n            a*=c.fade;\n            if(a>0.9)a=0.9;\n            ctx.fillStyle='rgba('+cfg.color+','+a.toFixed(3)+')';\n            ctx.fillText(c.buf[k], c.x, y);\n          }\n          if(!reduce && c.head-trail*fs>H){ c.head=rnd(-H*0.5,0); c.buf=[]; c.last=null; c.sp=rnd(0.6,1.6); }\n        }\n      }\n      if(!reduce) raf=requestAnimationFrame(frame);\n    }\n    function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(frame); }\n    function stop(){ if(raf){cancelAnimationFrame(raf); raf=null;} }\n    var rt;\n    window.addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(size,160);});\n    document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});\n    size(); start();\n\n    // ---- tweak panel wiring ----\n    var fab=document.getElementById('twFab'), panel=document.getElementById('twPanel');\n    fab.addEventListener('click',function(){panel.hidden=!panel.hidden;});\n    document.getElementById('twClose').addEventListener('click',function(){panel.hidden=true;});\n\n    var enSw=document.getElementById('twEnabled'); enSw.classList.toggle('on',cfg.enabled);\n    enSw.addEventListener('click',function(){cfg.enabled=!cfg.enabled; enSw.classList.toggle('on',cfg.enabled); if(reduce)frame(); save();});\n\n    function bindSeg(wrapId,key,after){\n      var wrap=document.getElementById(wrapId);\n      [].forEach.call(wrap.children,function(b){\n        var val=b.dataset.v||b.dataset.c; b.classList.toggle('on',val===cfg[key]);\n        b.addEventListener('click',function(){\n          cfg[key]=val; [].forEach.call(wrap.children,function(x){x.classList.toggle('on',x===b);});\n          if(after)after(); if(reduce)frame(); save();\n        });\n      });\n    }\n    function bindSlider(id,vid,key,fmt,rebuild){\n      var el=document.getElementById(id), v=document.getElementById(vid);\n      el.value=cfg[key]; v.textContent=fmt(cfg[key]);\n      el.addEventListener('input',function(){cfg[key]=parseFloat(el.value); v.textContent=fmt(cfg[key]); if(rebuild)build(); if(reduce)frame(); save();});\n    }\n    bindSeg('twCharset','charset');\n    bindSeg('twColor','color');\n    bindSlider('twDensity','twDensityV','density',function(x){return x.toFixed(1);},true);\n    bindSlider('twSpeed','twSpeedV','speed',function(x){return x.toFixed(1);},false);\n    bindSlider('twTrail','twTrailV','trail',function(x){return String(x|0);},false);\n    bindSlider('twSize','twSizeV','size',function(x){return String(x|0);},true);\n    bindSlider('twInt','twIntV','intensity',function(x){return x.toFixed(2);},false);\n  })();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
